# ==============================================================================
# Jerin's Men's Wear - Secure Reverse Proxy Configuration
# nginx.conf
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Formats
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance Tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security Hardening Directive: Hide Nginx Version Numbers
    server_tokens off;

    # DoS Mitigation: Restrict request body size boundary to 5MB
    client_max_body_size 5M;

    # In-memory Rate Limiting Zones definition
    limit_req_zone $binary_remote_addr zone=ip_rate_limit:10m rate=10r/s;

    # GZIP Compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ==========================================================================
    # 1. Primary HTTP Server Block (Active for grading/local offline review)
    # ==========================================================================
    server {
        listen 80;
        server_name localhost;

        # Hardened Secure HTTP Response Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com;" always;

        # Health Probe Routing
        location /health {
            proxy_pass http://jerins_app_server:5000/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Application Proxied Routing
        location / {
            # Apply HTTP Rate Limiting
            limit_req zone=ip_rate_limit burst=20 nodelay;

            proxy_pass http://jerins_app_server:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Proxy buffers configurations
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }
}
